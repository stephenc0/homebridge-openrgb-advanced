<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  html, body {
    background: transparent;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 14px;
    padding: 16px;
    color: var(--text-colour, #212529);
  }
  .field { margin-bottom: 12px; }
  label { display: block; font-weight: 500; margin-bottom: 4px; font-size: 13px; }
  input[type=text], input[type=number] {
    width: 100%;
    padding: 6px 10px;
    border: 1px solid var(--border-colour, #ced4da);
    border-radius: 4px;
    background: var(--input-background-colour, #fff);
    color: var(--text-colour, #212529);
    font-size: 14px;
  }
  .toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 0;
    border-bottom: 1px solid var(--border-colour, #dee2e6);
  }
  .server-card {
    border: 1px solid var(--border-colour, #dee2e6);
    border-radius: 6px;
    padding: 14px;
    margin-bottom: 12px;
  }
  .server-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .server-title { font-weight: 600; font-size: 15px; }
  .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .device-card {
    border: 1px solid var(--border-colour, #dee2e6);
    border-radius: 4px;
    padding: 10px 12px;
    margin-bottom: 8px;
    background: var(--modal-background-colour, transparent);
  }
  .device-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }
  .device-name { font-weight: 500; font-size: 13px; }
  .device-location { font-size: 11px; color: var(--text-muted-colour, #6c757d); margin-top: 1px; }
  .wb-row {
    display: grid;
    grid-template-columns: 20px 1fr 20px 36px;
    align-items: center;
    gap: 8px;
  }
  .sat-row {
    display: grid;
    grid-template-columns: 60px 1fr 36px;
    align-items: center;
    gap: 8px;
    margin-top: 4px;
  }
  .sat-label { font-size: 11px; color: var(--text-muted-colour, #6c757d); }
  .wb-label { font-size: 11px; color: var(--text-muted-colour, #6c757d); }
  .wb-label.cool { color: #6aa3f5; }
  .wb-label.warm { color: #f5a623; text-align: right; }
  input[type=range] { width: 100%; cursor: pointer; accent-color: var(--primary-colour, #007bff); }
  .wb-value {
    text-align: center;
    font-size: 11px;
    color: var(--text-muted-colour, #6c757d);
    margin-top: 3px;
  }
  .zone-toggle {
    font-size: 12px;
    color: var(--primary-colour, #0d6efd);
    cursor: pointer;
    background: none;
    border: none;
    padding: 4px 0 0;
    display: block;
    text-align: center;
    width: 100%;
  }
  .zone-grid {
    margin-top: 8px;
    border-top: 1px solid var(--border-colour, #dee2e6);
    padding-top: 8px;
  }
  .zone-row { margin-bottom: 10px; }
  .zone-label {
    font-size: 12px;
    font-weight: 500;
    margin-bottom: 3px;
    display: flex;
    justify-content: space-between;
  }
  .zone-leds { font-size: 11px; color: var(--text-muted-colour, #6c757d); font-weight: normal; }
  .btn {
    padding: 5px 12px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
  }
  .btn-primary { background: var(--primary-colour, #007bff); color: #fff; }
  .btn-danger { background: #dc3545; color: #fff; padding: 2px 8px; font-size: 12px; }
  .btn-outline {
    background: transparent;
    border: 1px solid var(--primary-colour, #007bff);
    color: var(--primary-colour, #007bff);
  }
  .btn:disabled { opacity: 0.55; cursor: default; }
  .section-title { font-weight: 600; margin: 16px 0 8px; font-size: 14px; }
  .discover-row { display: flex; align-items: center; gap: 10px; margin: 10px 0 8px; }
  .discover-status { font-size: 12px; color: var(--text-muted-colour, #6c757d); }
  .no-devices { font-size: 13px; color: var(--text-muted-colour, #6c757d); padding: 4px 0 8px; }
  .icon-btn {
    font-size: 12px;
    padding: 2px 8px;
    background: transparent;
    border: 1px solid var(--border-colour, #ced4da);
    border-radius: 4px;
    color: inherit;
    cursor: pointer;
  }
  .icon-btn:disabled { opacity: 0.5; cursor: default; }
  .wb-num {
    font-size: 12px;
    font-weight: 600;
    min-width: 32px;
    text-align: center;
    color: inherit;
  }
</style>
</head>
<body>
<div id="app"></div>
<script>
(async () => {
  const configs = await homebridge.getPluginConfig();
  const cfg = Object.assign(
    { name: 'OpenRGB Advanced', servers: [], discoveryInterval: 60, preserveDisconnected: false, suppressConnectionErrors: false },
    configs[0] || {}
  );
  if (!cfg.servers) cfg.servers = [];

  const app = document.getElementById('app');

  // Tracks which zone panels are open across re-renders: key = "serverName|deviceName|location"
  const openZonePanels = new Set();

  /* ---- auto-push config on changes ---- */
  let pushTimer;
  function pushConfig() {
    clearTimeout(pushTimer);
    pushTimer = setTimeout(() => homebridge.updatePluginConfig([cfg]), 500);
  }

  /* ---- helpers ---- */
  function el(tag, props, ...children) {
    const e = document.createElement(tag);
    for (const [k, v] of Object.entries(props || {})) {
      if (k === 'style' && typeof v === 'string') e.style.cssText = v;
      else if (k.startsWith('on')) e[k] = v;
      else if (k in e) e[k] = v;
      else e.setAttribute(k, v);
    }
    for (const c of children) {
      if (c == null) continue;
      e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
    }
    return e;
  }

  function field(labelText, value, type, onChange) {
    const input = el('input', { type, value: value ?? '' });
    input.oninput = () => { onChange(input.value); pushConfig(); };
    return el('div', { className: 'field' }, el('label', {}, labelText), input);
  }

  function toggle(labelText, checked, onChange) {
    const cb = el('input', { type: 'checkbox', checked: !!checked, style: 'width:auto' });
    cb.onchange = () => { onChange(cb.checked); pushConfig(); };
    return el('div', { className: 'toggle-row' }, el('span', {}, labelText), cb);
  }

  // Convert internal wb (0-255) to display scalar (-10 to +10)
  function wbToDisplay(wb) {
    const v = Math.round((wb - 128) / 12.8);
    return Math.max(-10, Math.min(10, v));
  }
  function displayToWb(v) {
    return Math.max(0, Math.min(255, Math.round(v * 12.8 + 128)));
  }
  function wbDisplayStr(wb) {
    const v = wbToDisplay(wb);
    return v > 0 ? `+${v}` : String(v);
  }

  /* ---- device list ---- */
  function makeWbSlider(wb, onChange, { initialWb = wb, coolLabel = '❄', warmLabel = '☀', coolTitle = 'Cooler (more blue)', warmTitle = 'Warmer (more red)' } = {}) {
    const numLabel = el('span', { className: 'wb-num' }, wbDisplayStr(wb));
    const uid = Math.random().toString(36).slice(2);
    const marks = el('datalist', { id: uid });
    marks.appendChild(el('option', { value: wbToDisplay(initialWb) }));
    const slider = el('input', { type: 'range', min: -10, max: 10, step: 1, value: wbToDisplay(wb), list: uid });
    slider.oninput = () => {
      const newWb = displayToWb(parseInt(slider.value));
      numLabel.textContent = wbDisplayStr(newWb);
      onChange(newWb);
      pushConfig();
    };
    return el('div', { className: 'wb-row' },
      marks,
      el('span', { className: 'wb-label cool', title: coolTitle }, coolLabel),
      slider,
      el('span', { className: 'wb-label warm', title: warmTitle }, warmLabel),
      numLabel
    );
  }

  function makeTestBtn(onTest, title = 'Preview current correction on the device for 3 seconds') {
    const btn = el('button', { className: 'icon-btn', title }, '▶');
    btn.onclick = async () => {
      btn.disabled = true;
      let secs = 3;
      btn.textContent = `${secs}s`;
      const tick = setInterval(() => {
        secs--;
        btn.textContent = secs > 0 ? `${secs}s` : '…';
      }, 1000);
      try {
        await onTest();
      } catch (e) {
        homebridge.toast.error(e.message, 'Test failed');
      }
      clearInterval(tick);
      btn.disabled = false;
      btn.textContent = '▶';
    };
    return btn;
  }

  function makeSatSlider(sat, onChange, initialSat = sat) {
    const numLabel = el('span', { className: 'wb-num' }, `${sat ?? 100}%`);
    const uid = Math.random().toString(36).slice(2);
    const marks = el('datalist', { id: uid });
    marks.appendChild(el('option', { value: initialSat ?? 100 }));
    const slider = el('input', { type: 'range', min: 0, max: 100, step: 1, value: sat ?? 100, list: uid });
    slider.oninput = () => {
      const v = parseInt(slider.value);
      numLabel.textContent = `${v}%`;
      onChange(v);
      pushConfig();
    };
    return el('div', { className: 'sat-row' },
      marks,
      el('span', { className: 'sat-label', title: 'Scale down color saturation (100% = unchanged, 0% = grey/white)' }, 'Saturation'),
      slider,
      numLabel
    );
  }

  function makeIdentifyBtn(server, dc) {
    const btn = el('button', { className: 'icon-btn', title: 'Flash all LEDs on this device to identify it' }, '💡');
    btn.onclick = async () => {
      btn.disabled = true;
      try {
        await homebridge.request('/identify', {
          host: server.host, port: server.port, name: server.name,
          deviceName: dc.name, location: dc.location,
        });
      } catch (e) {
        homebridge.toast.error(e.message, 'Identify failed');
      }
      btn.disabled = false;
    };
    return btn;
  }

  function makeZoneIdentifyBtn(server, dc, zone) {
    const btn = el('button', { className: 'icon-btn', title: `Flash "${zone.name}" zone LEDs to identify them` }, '💡');
    btn.onclick = async () => {
      btn.disabled = true;
      try {
        await homebridge.request('/identify-zone', {
          host: server.host, port: server.port, name: server.name,
          deviceName: dc.name, location: dc.location, zoneName: zone.name,
        });
      } catch (e) {
        homebridge.toast.error(e.message, 'Identify zone failed');
      }
      btn.disabled = false;
    };
    return btn;
  }

  function renderDevices(server, container) {
    container.innerHTML = '';
    if (!server.deviceConfigs || !server.deviceConfigs.length) {
      container.appendChild(el('div', { className: 'no-devices' }, 'No devices — click Discover to load from server.'));
      return;
    }
    server.deviceConfigs.forEach((dc, di) => {
      if (!dc.ledWhiteBalance) dc.ledWhiteBalance = [];

      // Snapshot saved correction values — used to undo the currently-applied correction during test
      const savedWb = dc.whiteBalance ?? 128;
      const savedTint = dc.tint ?? 128;
      const savedSat = dc.saturation ?? 100;
      const savedZoneWb = Object.assign({}, dc.zoneWhiteBalance);
      const savedZoneTint = Object.assign({}, dc.zoneTint);
      const savedZoneSat = Object.assign({}, dc.zoneSaturation);

      const nameEl = el('div', { className: 'device-name' }, dc.name);
      const headerLeft = el('div', {}, nameEl);
      if (dc.location) headerLeft.appendChild(el('div', { className: 'device-location' }, dc.location));

      const testBase = { host: server.host, port: server.port, name: server.name, deviceName: dc.name, location: dc.location };

      // Device-level sliders (apply to all LEDs not covered by a zone override)
      const deviceSlider = makeWbSlider(dc.whiteBalance ?? 128, v => { dc.whiteBalance = v; }, { initialWb: savedWb });
      const deviceTintSlider = makeWbSlider(dc.tint ?? 128, v => { dc.tint = v; },
        { initialWb: savedTint, coolLabel: '🟢', warmLabel: '🟣', coolTitle: 'More green', warmTitle: 'More magenta' }
      );
      const deviceSatSlider = makeSatSlider(dc.saturation ?? 100, v => { dc.saturation = v; }, savedSat);
      const deviceTestBtn = makeTestBtn(() =>
        homebridge.request('/test-wb', { ...testBase, wb: dc.whiteBalance ?? 128, oldWb: savedWb, tint: dc.tint ?? 128, oldTint: savedTint, sat: dc.saturation ?? 100, oldSat: savedSat })
      );

      // Per-zone section (hidden by default)
      const zones = dc.zones ?? [];
      if (!dc.zoneWhiteBalance) dc.zoneWhiteBalance = {};
      if (!dc.zoneTint) dc.zoneTint = {};
      if (!dc.zoneSaturation) dc.zoneSaturation = {};
      const zoneGrid = el('div', { className: 'zone-grid', style: 'display:none' });

      function renderZoneGrid() {
        zoneGrid.innerHTML = '';
        if (!zones.length) {
          zoneGrid.appendChild(el('div', { style: 'font-size:12px;color:var(--text-muted-colour,#6c757d)' }, 'No zones — re-discover to load zone info.'));
          return;
        }
        for (const zone of zones) {
          const zoneWb = dc.zoneWhiteBalance[zone.name] ?? 128;
          const zoneOldWb = savedZoneWb[zone.name] ?? 128;
          const zoneOldTint = savedZoneTint[zone.name] ?? 128;
          const zoneOldSat = savedZoneSat[zone.name] ?? 100;
          const zoneTestBase = { ...testBase, zoneName: zone.name };
          const wbSlider = makeWbSlider(zoneWb, v => { dc.zoneWhiteBalance[zone.name] = v; }, { initialWb: zoneOldWb });
          const tintSlider = makeWbSlider(dc.zoneTint[zone.name] ?? 128, v => { dc.zoneTint[zone.name] = v; },
            { initialWb: zoneOldTint, coolLabel: '🟢', warmLabel: '🟣', coolTitle: 'More green', warmTitle: 'More magenta' }
          );
          const satSlider = makeSatSlider(dc.zoneSaturation[zone.name] ?? 100, v => { dc.zoneSaturation[zone.name] = v; }, zoneOldSat);
          const zoneTestBtn = makeTestBtn(() =>
            homebridge.request('/test-wb', { ...zoneTestBase, wb: dc.zoneWhiteBalance[zone.name] ?? 128, oldWb: zoneOldWb, tint: dc.zoneTint[zone.name] ?? 128, oldTint: zoneOldTint, sat: dc.zoneSaturation[zone.name] ?? 100, oldSat: zoneOldSat })
          );
          zoneGrid.appendChild(el('div', { className: 'zone-row' },
            el('div', { className: 'zone-label' },
              el('span', {}, zone.name),
              el('div', { style: 'display:flex;gap:6px;align-items:center' },
                el('span', { className: 'zone-leds' }, `${zone.ledCount} LEDs`),
                makeZoneIdentifyBtn(server, dc, zone),
                zoneTestBtn
              )
            ),
            wbSlider,
            tintSlider,
            satSlider
          ));
        }
      }
      renderZoneGrid();

      const panelKey = `${server.name}|${dc.name}|${dc.location ?? ''}`;
      let zoneOpen = openZonePanels.has(panelKey);
      if (zoneOpen) zoneGrid.style.display = 'block';
      const zoneLabel = zones.length ? `▼ Zone overrides (${zones.length} zones)` : '▼ Zone overrides (discover to load)';
      const openLabel = zones.length ? '▲ Hide zone overrides' : '▲ Hide zone overrides';
      const toggleBtn = el('button', { className: 'zone-toggle', onclick: () => {
        zoneOpen = !zoneOpen;
        if (zoneOpen) openZonePanels.add(panelKey); else openZonePanels.delete(panelKey);
        zoneGrid.style.display = zoneOpen ? 'block' : 'none';
        toggleBtn.textContent = zoneOpen ? openLabel : zoneLabel;
      }}, zoneOpen ? openLabel : zoneLabel);

      const card = el('div', { className: 'device-card' },
        el('div', { className: 'device-header' },
          headerLeft,
          el('div', { style: 'display:flex;gap:6px;align-items:center' },
            makeIdentifyBtn(server, dc),
            deviceTestBtn,
            el('button', { className: 'btn btn-danger', title: 'Remove this device', onclick: () => {
              server.deviceConfigs.splice(di, 1);
              renderDevices(server, container);
            }}, '✕')
          )
        ),
        deviceSlider,
        deviceTintSlider,
        deviceSatSlider,
        toggleBtn,
        zoneGrid
      );
      container.appendChild(card);
    });
  }

  /* ---- server card ---- */
  function renderServer(server, si) {
    if (!server.deviceConfigs) server.deviceConfigs = [];
    const titleEl = el('span', { className: 'server-title' }, server.name || 'Server');
    const devicesDiv = el('div');

    const discoverStatus = el('span', { className: 'discover-status' });
    const discoverBtn = el('button', { className: 'btn btn-outline', title: 'Connect to the OpenRGB server and detect devices', onclick: async () => {
      discoverBtn.disabled = true;
      discoverStatus.textContent = 'Connecting…';
      try {
        const result = await homebridge.request('/discover', { host: server.host, port: server.port, name: server.name });

        // Count names to detect duplicates
        const nameCounts = {};
        for (const d of result.devices) nameCounts[d.name] = (nameCounts[d.name] || 0) + 1;

        let added = 0, refreshed = 0;
        for (const d of result.devices) {
          const alreadyExists = server.deviceConfigs.find(dc =>
            dc.name === d.name && (dc.location === undefined || dc.location === d.location)
          );
          if (alreadyExists) {
            alreadyExists.zones = d.zones; // refresh zone info (including LED counts)
            refreshed++;
          } else {
            const entry = { name: d.name, whiteBalance: 128, zones: d.zones, zoneWhiteBalance: {} };
            if (nameCounts[d.name] > 1) entry.location = d.location;
            server.deviceConfigs.push(entry);
            added++;
          }
        }
        const parts = [`${result.devices.length} device(s) found`];
        if (added) parts.push(`${added} new`);
        if (refreshed) parts.push(`${refreshed} refreshed`);
        discoverStatus.textContent = parts.join(', ') + '.';
        renderDevices(server, devicesDiv);
      } catch (e) {
        discoverStatus.textContent = `Failed: ${e.message}`;
      }
      discoverBtn.disabled = false;
    }}, 'Discover Devices');

    const hostInput = el('input', { type: 'text', value: server.host ?? '' });
    hostInput.oninput = () => server.host = hostInput.value;
    const nameInput = el('input', { type: 'text', value: server.name ?? '' });
    nameInput.oninput = () => { server.name = nameInput.value; titleEl.textContent = nameInput.value; };
    const portInput = el('input', { type: 'number', value: server.port ?? 6742 });
    portInput.oninput = () => server.port = parseInt(portInput.value);

    const card = el('div', { className: 'server-card' },
      el('div', { className: 'server-header' },
        titleEl,
        el('button', { className: 'btn btn-danger', title: 'Remove this server', onclick: () => { cfg.servers.splice(si, 1); render(); }}, 'Remove')
      ),
      el('div', { className: 'row-2' },
        el('div', { className: 'field' }, el('label', {}, 'Name'), nameInput),
        el('div', { className: 'field' }, el('label', {}, 'Host'), hostInput)
      ),
      el('div', { className: 'field' }, el('label', {}, 'Port'), portInput),
      el('div', { className: 'discover-row' }, discoverBtn, discoverStatus),
      devicesDiv
    );

    renderDevices(server, devicesDiv);
    app.appendChild(card);
  }

  /* ---- render ---- */
  function render() {
    app.innerHTML = '';
    app.appendChild(field('Plugin Name', cfg.name, 'text', v => cfg.name = v));
    app.appendChild(field('Discovery Interval (seconds)', cfg.discoveryInterval, 'number', v => cfg.discoveryInterval = parseInt(v)));
    app.appendChild(toggle('Preserve Disconnected Devices', cfg.preserveDisconnected, v => cfg.preserveDisconnected = v));
    app.appendChild(toggle('Suppress Connection Errors', cfg.suppressConnectionErrors, v => cfg.suppressConnectionErrors = v));

    app.appendChild(el('div', { className: 'section-title' }, 'Servers'));
    cfg.servers.forEach((s, i) => renderServer(s, i));
    app.appendChild(el('button', { className: 'btn btn-outline', title: 'Add another OpenRGB server', onclick: () => {
      cfg.servers.push({ name: 'My Computer', host: 'localhost', port: 6742, deviceConfigs: [] });
      pushConfig();
      render();
    }}, '+ Add Server'));
  }

  render();
})();
</script>
</body>
</html>
